name: CD

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - '.github/workflows/cd.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend API
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GH_USERNAME,GH_TOKEN
          script: |
            set -e

            cd /opt/saasDelivery/server

            echo "→ Backing up .env before pull..."
            if [ -f wwebjs-bot/.env ]; then
              cp wwebjs-bot/.env /tmp/livsight-server.env
            elif [ -f server/.env ]; then
              cp server/.env /tmp/livsight-server.env
            fi

            echo "→ Pulling latest code..."
            git remote set-url origin https://${GH_USERNAME}:${GH_TOKEN}@github.com/Ericdt17/saasDelivery.git
            git fetch origin main
            git reset --hard origin/main

            echo "→ Restoring .env if missing..."
            if [ ! -f server/.env ] && [ -f /tmp/livsight-server.env ]; then
              cp /tmp/livsight-server.env server/.env
              chmod 600 server/.env
            fi

            if [ ! -f server/.env ]; then
              echo "ERROR: server/.env missing — restore DATABASE_URL and secrets on VPS"
              exit 1
            fi

            echo "→ Installing dependencies..."
            cd server
            npm install --omit=dev

            echo "→ Running migrations..."
            npm run migrate

            echo "→ Restarting API server..."
            pm2 restart api-server || pm2 start ecosystem.config.js || pm2 start src/api/server.js --name api-server
            pm2 save

            echo "→ Verifying service..."
            sleep 3
            pm2 list | grep api-server
            curl -fsS http://127.0.0.1:3001/api/v1/health

            echo "✓ Deploy complete"
