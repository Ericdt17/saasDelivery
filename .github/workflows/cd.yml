name: CD

on:
  push:
    branches:
      - main
    paths:
      - 'wwebjs-bot/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend & bot
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GH_USERNAME,GH_TOKEN
          script: |
            set -e

            cd /opt/saasDelivery/wwebjs-bot

            echo "→ Pulling latest code..."
            git remote set-url origin https://${GH_USERNAME}:${GH_TOKEN}@github.com/Ericdt17/saasDelivery.git
            git fetch origin main
            git reset --hard origin/main

            echo "→ Installing dependencies..."
            cd wwebjs-bot
            npm install --omit=dev

            echo "→ Running migrations..."
            npm run migrate

            echo "→ Restarting services..."
            pm2 restart api-server || pm2 start src/api/server.js --name api-server
            pm2 restart whatsapp-bot || pm2 start src/index.js --name whatsapp-bot
            pm2 save

            echo "→ Verifying services..."
            sleep 3
            pm2 list | grep -E "api-server|whatsapp-bot"

            echo "✓ Deploy complete"
