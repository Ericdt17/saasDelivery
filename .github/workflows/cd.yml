name: CD

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Deploy backend API
        uses: appleboy/ssh-action@v1.0.3
        env:
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GH_USERNAME,GH_TOKEN
          script: |
            set -e

            cd /opt/saasDelivery/server

            echo "→ Pulling latest code..."
            git remote set-url origin https://${GH_USERNAME}:${GH_TOKEN}@github.com/Ericdt17/saasDelivery.git
            git fetch origin main
            git reset --hard origin/main

            # One-time migration: inner folder renamed wwebjs-bot → server
            if [ -d wwebjs-bot ] && [ ! -d server ]; then
              echo "→ Migrating wwebjs-bot/ to server/..."
              cp wwebjs-bot/.env /tmp/livsight-server.env 2>/dev/null || true
              mv wwebjs-bot server
              cp /tmp/livsight-server.env server/.env 2>/dev/null || true
            fi

            echo "→ Installing dependencies..."
            cd server
            npm install --omit=dev

            echo "→ Running migrations..."
            npm run migrate

            echo "→ Restarting API server..."
            pm2 restart api-server || pm2 start ecosystem.config.js || pm2 start src/api/server.js --name api-server
            pm2 save

            echo "→ Verifying service..."
            sleep 3
            pm2 list | grep api-server
            curl -fsS http://127.0.0.1:3001/api/v1/health

            echo "✓ Deploy complete"
